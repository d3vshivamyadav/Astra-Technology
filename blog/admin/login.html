<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Astra Blog</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../../assets/favicon.ico">
    <link rel="apple-touch-icon" href="../../assets/favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: #ffffff;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            border: 1px solid #eef2f6;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
        }

        .login-container .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-container .logo h1 {
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
        }

        .login-container .logo p {
            color: #64748b;
            font-size: 14px;
        }

        .login-container .logo .lock-icon {
            font-size: 48px;
            color: #3b82f6;
            display: block;
            margin-bottom: 8px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            background: #f8fafc;
        }

        .form-group input:focus {
            border-color: #3b82f6;
            outline: none;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            margin-top: 4px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.25);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            border: 1px solid #fca5a5;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 16px;
        }

        .back-link a {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #3b82f6;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 32px 20px;
                border-radius: 16px;
            }
            .login-container .logo h1 {
                font-size: 20px;
            }
        }

        [data-theme="dark"] .login-container {
            background: #1e293b;
            border-color: #334155;
        }

        [data-theme="dark"] .login-container .logo h1 {
            color: #f8fafc;
        }

        [data-theme="dark"] .login-container .logo p {
            color: #94a3b8;
        }

        [data-theme="dark"] .form-group label {
            color: #f8fafc;
        }

        [data-theme="dark"] .form-group input {
            background: #0f172a;
            border-color: #334155;
            color: #f8fafc;
        }

        [data-theme="dark"] .form-group input:focus {
            border-color: #3b82f6;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo">
            <span class="lock-icon">🔐</span>
            <h1>Admin Login</h1>
            <p>Enter your credentials to access the dashboard</p>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fa-solid fa-circle-exclamation"></i> Invalid username or password. Please try again.
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username"><i class="fa-regular fa-user"></i> Username</label>
                <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password"><i class="fa-regular fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Login
            </button>
        </form>

        <div class="back-link">
            <a href="/blog/"><i class="fa-solid fa-arrow-left"></i> Back to Blog</a>
        </div>
    </div>

    <script>
        // ============================================================
        // ADMIN LOGIN - Secure Authentication
        // ============================================================

        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');

        // ===== CREDENTIALS (Change these) =====
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'Astra@2026';

        // ===== Check if already logged in =====
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            // Disable button
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';

            // Simulate verification delay
            setTimeout(() => {
                if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                    // Success - Store session
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    sessionStorage.setItem('adminUsername', username);
                    
                    // Redirect to admin dashboard
                    window.location.href = 'index.html';
                } else {
                    // Failed
                    errorMessage.classList.add('show');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Login';
                    
                    // Shake animation
                    errorMessage.style.animation = 'shake 0.5s ease';
                    setTimeout(() => {
                        errorMessage.style.animation = '';
                    }, 500);
                }
            }, 800);
        });

        // ===== Enter key support =====
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });

        usernameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                passwordInput.focus();
            }
        });

        // ===== Shake animation =====
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20% { transform: translateX(-10px); }
                40% { transform: translateX(10px); }
                60% { transform: translateX(-5px); }
                80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);

        // ===== Clear error on typing =====
        usernameInput.addEventListener('input', function() {
            errorMessage.classList.remove('show');
        });
        passwordInput.addEventListener('input', function() {
            errorMessage.classList.remove('show');
        });
    </script>
</body>

</html>
